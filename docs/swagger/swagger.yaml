host: localhost:8080
info:
  contact:
    name: API Support
    url: https://github.com/javinizer/javinizer-go/issues
  description: REST API for JAV metadata scraping and file organization
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/javinizer/javinizer-go
  title: Javinizer API
  version: "1.0"
paths:
  /api/v1/actresses:
    get:
      description: Get a paginated list of actresses with optional search query and
        sorting
      parameters:
      - description: Search query
        in: query
        name: q
        type: string
      - default: name
        description: Sort column (id, dmm_id, japanese_name, first_name, last_name,
          created_at, updated_at, name)
        in: query
        name: sort_by
        type: string
      - default: asc
        description: Sort direction (asc, desc)
        in: query
        name: sort_order
        type: string
      - default: 50
        description: Max results
        in: query
        name: limit
        type: integer
      - default: 0
        description: Skip results
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_actress.actressesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
      summary: List actresses
      tags:
      - actress
    post:
      consumes:
      - application/json
      description: Create a new actress record with the provided details
      parameters:
      - description: Actress details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_actress.actressRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api_actress.Actress'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
      summary: Create actress
      tags:
      - actress
  /api/v1/actresses/{id}:
    delete:
      description: Delete an actress record by ID
      parameters:
      - description: Actress ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
      summary: Delete actress
      tags:
      - actress
    get:
      description: Retrieve a single actress by their database ID
      parameters:
      - description: Actress ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_actress.Actress'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
      summary: Get actress by ID
      tags:
      - actress
    put:
      consumes:
      - application/json
      description: Update an existing actress record by ID
      parameters:
      - description: Actress ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated actress details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_actress.actressRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_actress.Actress'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
      summary: Update actress
      tags:
      - actress
  /api/v1/actresses/merge:
    post:
      consumes:
      - application/json
      description: Merge a source actress into a target actress with field-level target/source
        resolutions.
      parameters:
      - description: Merge request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_actress.ActressMergeRequest'
      produces:
      - application/json
      responses:
