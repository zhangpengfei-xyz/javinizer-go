        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
      summary: Merge duplicated actresses
      tags:
      - actress
  /api/v1/actresses/merge/preview:
    post:
      consumes:
      - application/json
      description: Build a merge preview and field conflict set for target/source
        actress IDs.
      parameters:
      - description: Merge preview request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_actress.ActressMergePreviewRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api_actress.ActressMergePreviewResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
      summary: Preview actress merge
      tags:
      - actress
  /api/v1/actresses/search:
    get:
      description: Search for actresses by name (first, last, or Japanese)
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_actress.Actress'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api_actress.ErrorResponse'
      summary: Search actresses
      tags:
      - actress
