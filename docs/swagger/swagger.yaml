        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api_auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api_auth.ErrorResponse'
        "429":
